name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6    
    - name: setup
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
      
    - name: Install dependencies
      run: npm install
      
    - name: Build
      run:  npm run build
